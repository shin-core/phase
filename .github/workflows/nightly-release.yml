name: Nightly Release

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-release
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  cut-nightly-release:
    name: Cut Nightly Release
    # Forks inherit this workflow's schedule but not upstream secrets
    # (RELEASE_BOT_TOKEN), so a scheduled run in a fork can only fail noisily.
    # Restrict the whole release graph to the canonical repository.
    if: github.repository == 'phase-rs/phase'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      dispatch_recovery: ${{ steps.release-run.outputs.dispatch_recovery }}
      release_tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Verify release bot token
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_BOT_TOKEN" ]; then
            echo "::error::RELEASE_BOT_TOKEN is required so commit/tag pushes trigger downstream workflows"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: rust-nightly-release

      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name "phase-rs release bot"
          git config user.email "phase-rs-release-bot@users.noreply.github.com"

      - name: Compute release version
        id: version
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          set -euo pipefail

          current_version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -1)
          if [[ ! "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Cargo.toml version $current_version is not plain SemVer"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"

          # Each nightly bumps the MINOR version (patch always resets to 0). Find
          # the highest minor already released for this major and take the next
          # one; never go backwards relative to Cargo.toml's own minor.
          latest_minor=$(gh release list --limit 100 --json tagName \
            | jq -r --arg major "$major" '
                [
                  .[].tagName
                  | capture("^v(?<major>[0-9]+)\\.(?<minor>[0-9]+)\\.(?<patch>[0-9]+)$")?
                  | select(.major == $major)
                  | .minor | tonumber
                ]
                | max // empty
              ')

          next_minor=0
          if [ -n "$latest_minor" ]; then
            next_minor=$((latest_minor + 1))
          fi

          if [ "$minor" -lt "$next_minor" ]; then
            minor="$next_minor"
          fi
          patch=0

          if [ "$major" -gt 255 ] || [ "$minor" -gt 255 ] || [ "$patch" -gt 65535 ]; then
            echo "::error::Version $major.$minor.$patch is not valid for the Windows MSI ProductVersion"
            exit 1
          fi

          VERSION="$major.$minor.$patch"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify main and tags
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force origin main
          git fetch --force --tags origin

          # main is a live merge-queue branch, so a commit can land between this
          # job's checkout and now. That is a benign fast-forward, not an error:
          # re-cut the release from the current tip instead of failing the nightly.
          # A divergence (tip is not a descendant of our checkout) is not
          # recoverable here and still fails.
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            if [ "$(git merge-base HEAD origin/main)" != "$(git rev-parse HEAD)" ]; then
              echo "::error::origin/main diverged from the checked-out commit"
              exit 1
            fi
            echo "main advanced $(git rev-parse --short HEAD)..$(git rev-parse --short origin/main) since checkout; re-cutting from the current tip."
            git reset --hard origin/main
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; recovery checks will run without creating a new release commit."
          fi

      - name: Verify existing tag version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            exit 0
          fi

          check_toml_version() {
            local path="$1"
            local actual
            actual=$(git show "$TAG:$path" | sed -nE 's/^version = "([^"]+)"/\1/p' | head -1)
            if [ "$actual" != "$VERSION" ]; then
              echo "::error::$path version $actual does not match $TAG"
              exit 1
            fi
          }

          check_json_version() {
            local path="$1"
            local actual
            actual=$(git show "$TAG:$path" | jq -r '.version')
            if [ "$actual" != "$VERSION" ]; then
              echo "::error::$path version $actual does not match $TAG"
              exit 1
            fi
          }

          check_toml_version Cargo.toml
          check_json_version client/package.json
          check_json_version client/src-tauri/tauri.conf.json
          check_toml_version client/src-tauri/Cargo.toml

      - name: Check existing release workflow run
        id: release-run
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          echo "dispatch_recovery=false" >> "$GITHUB_OUTPUT"
          echo "skip_creation=false" >> "$GITHUB_OUTPUT"

          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            exit 0
          fi

          echo "skip_creation=true" >> "$GITHUB_OUTPUT"

          # The published GitHub Release is the authoritative signal, not a release-run
          # conclusion. The version step above already derives next_minor from the highest
          # published release, so keying recovery off that same fact keeps the two
          # consistent. Matching on run conclusions instead let them disagree: a tag whose
          # release run died before the publish gate (e.g. a build-server timeout) left the
          # version step forever recomputing that same version while this guard hard-failed
          # on the stale run — a deadlock no nightly could clear.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG is already published; nothing to recover."
            exit 0
          fi

          echo "Tag $TAG exists but its release is not published; dispatching recovery."
          echo "dispatch_recovery=true" >> "$GITHUB_OUTPUT"

      - name: Stop after existing tag handling
        if: ${{ steps.release-run.outputs.skip_creation == 'true' }}
        run: echo "Existing tag handled; no new release commit or tag will be created."

      - name: Install pinned cargo-release
        if: ${{ steps.release-run.outputs.skip_creation != 'true' }}
        run: cargo install cargo-release --version 1.1.2 --locked

      - name: Create release commit and local tag
        if: ${{ steps.release-run.outputs.skip_creation != 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          current_version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -1)
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; skipping release creation."
            exit 0
          fi

          if [ "$current_version" = "$VERSION" ]; then
            echo "origin/main is already at $VERSION without $TAG; creating the missing local tag."
            git tag -a "$TAG" -m "$TAG"
            exit 0
          fi

          cargo release "$VERSION" --workspace --execute --no-confirm --no-publish --no-push --allow-branch main

          # cargo-release bumps the main workspace but not nested lockfiles whose
          # path-dependencies it just revved. Resync them so the committed locks
          # match the new version, then fold them into the release commit + tag.
          cargo update --manifest-path client/src-tauri/Cargo.toml --package phase-tauri
          cargo update --manifest-path lobby-worker/broker-wasm/Cargo.toml --package engine --package lobby-broker
          if ! git diff --quiet -- client/src-tauri/Cargo.lock lobby-worker/broker-wasm/Cargo.lock; then
            git add client/src-tauri/Cargo.lock lobby-worker/broker-wasm/Cargo.lock
            git commit --amend --no-edit
            git tag -f -a "$TAG" -m "$TAG"
          fi

      - name: Verify release commit and tag
        if: ${{ steps.release-run.outputs.skip_creation != 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          check_toml_version() {
            local path="$1"
            local actual
            actual=$(sed -nE 's/^version = "([^"]+)"/\1/p' "$path" | head -1)
            if [ "$actual" != "$VERSION" ]; then
              echo "::error::$path version $actual does not match $VERSION"
              exit 1
            fi
          }

          check_json_version() {
            local path="$1"
            local actual
            actual=$(jq -r '.version' "$path")
            if [ "$actual" != "$VERSION" ]; then
              echo "::error::$path version $actual does not match $VERSION"
              exit 1
            fi
          }

          check_toml_version Cargo.toml
          check_json_version client/package.json
          check_json_version client/src-tauri/tauri.conf.json
          check_toml_version client/src-tauri/Cargo.toml

          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            echo "::error::cargo-release left the working tree dirty"
            exit 1
          fi

          if [ "$(git rev-list -n 1 "$TAG")" != "$(git rev-parse HEAD)" ]; then
            echo "::error::$TAG does not point at HEAD"
            exit 1
          fi

          current_version=$(git show HEAD:Cargo.toml | sed -nE 's/^version = "([^"]+)"/\1/p' | head -1)
          if [ "$current_version" != "$VERSION" ]; then
            echo "::error::HEAD version $current_version does not match $VERSION"
            exit 1
          fi

          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            changed=$(git diff-tree --no-commit-id --name-only -r HEAD | sort)
            allowed=$(printf '%s\n' \
              Cargo.lock \
              Cargo.toml \
              client/package.json \
              client/src-tauri/Cargo.lock \
              client/src-tauri/Cargo.toml \
              client/src-tauri/tauri.conf.json \
              lobby-worker/broker-wasm/Cargo.lock \
              | sort)
            extra=$(comm -23 <(printf '%s\n' "$changed") <(printf '%s\n' "$allowed"))
            if [ -n "$extra" ]; then
              echo "::error::Release commit changed unexpected files:"
              printf '%s\n' "$extra"
              exit 1
            fi
          fi

      - name: Push release commit
        if: ${{ steps.release-run.outputs.skip_creation != 'true' }}
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          # main is a live branch; it can advance between cutting the release
          # commit and pushing it. The release commit only touches version files,
          # which no ordinary PR modifies, so on divergence we rebase it onto the
          # current tip and retry instead of failing the nightly. Recreate the tag
          # to track the rebased commit. Bounded so a persistently-racing main
          # fails loudly rather than looping forever.
          pushed=false
          for attempt in 1 2 3 4 5; do
            git fetch --force origin main
            if [ "$(git rev-parse origin/main)" = "$(git rev-parse HEAD)" ]; then
              echo "Release commit is already on origin/main."
              pushed=true
              break
            fi
            if [ "$(git merge-base HEAD origin/main)" != "$(git rev-parse origin/main)" ]; then
              echo "origin/main advanced under the release commit; rebasing onto the current tip (attempt $attempt)."
              git rebase origin/main
              git tag -f -a "$TAG" -m "$TAG"
            fi
            if git push "https://x-access-token:${RELEASE_BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main; then
              pushed=true
              break
            fi
            echo "Push rejected (main moved again); retrying."
          done
          if [ "$pushed" != true ]; then
            echo "::error::Could not fast-forward the release commit onto main after 5 attempts"
            exit 1
          fi

      - name: Wait for CI on release commit
        if: ${{ steps.release-run.outputs.skip_creation != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_SHA=$(git rev-parse HEAD)
          deadline=$((SECONDS + 3600))

          # ci.yml's push trigger is paths-filtered, so a tip commit that touches
          # none of those paths (workflow chores, docs) never gets a push run and
          # waiting on its SHA times out after an hour. The code state of such a
          # commit is identical to its nearest ancestor that DID touch a filtered
          # path, so that ancestor's run is the honest gate — walk first-parents
          # to it and wait on that SHA instead. Keep this pattern list in sync
          # with the push.paths filter in ci.yml.
          touches_ci_paths() {
            git diff-tree --no-commit-id --name-only -r "$1" | grep -qE \
              '^(crates/|client/|lobby-worker/|scripts/|Cargo\.|\.cargo/|Dockerfile$|\.dockerignore$|docker/|\.github/actions/|\.github/workflows/(ci|deploy|release)\.yml$)'
          }
          WAIT_SHA=$RELEASE_SHA
          if ! touches_ci_paths "$WAIT_SHA"; then
            for _ in $(seq 1 50); do
              WAIT_SHA=$(git rev-parse "$WAIT_SHA^")
              if touches_ci_paths "$WAIT_SHA"; then
                break
              fi
            done
            if ! touches_ci_paths "$WAIT_SHA"; then
              echo "::error::No CI-relevant ancestor found within 50 commits of $RELEASE_SHA"
              exit 1
            fi
            echo "Release commit $RELEASE_SHA touches no ci.yml paths; gating on ancestor $WAIT_SHA instead"
          fi

          while [ "$SECONDS" -lt "$deadline" ]; do
            RUNS=$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
              -f branch=main \
              -f event=push \
              -f per_page=20)
            MATCH=$(jq -r --arg sha "$WAIT_SHA" '
              [
                .workflow_runs[]
                | select(.head_sha == $sha)
                | {status, conclusion, html_url, created_at}
              ]
              | sort_by(.created_at)
              | reverse
              | .[0] // empty
              | @base64
            ' <<< "$RUNS")

            if [ -n "$MATCH" ]; then
              decoded=$(echo "$MATCH" | base64 -d)
              status=$(jq -r '.status' <<< "$decoded")
              conclusion=$(jq -r '.conclusion' <<< "$decoded")
              url=$(jq -r '.html_url' <<< "$decoded")

              if [ "$status" = "completed" ]; then
                case "$conclusion" in
                  success)
                    echo "CI succeeded for $WAIT_SHA: $url"
                    exit 0
                    ;;
                  cancelled|skipped|stale|neutral)
                    # ci.yml uses cancel-in-progress on the shared CI-<ref> group,
                    # so any later push to main cancels this commit's run. Tell that
                    # benign supersession apart from a genuine transient cancel by
                    # asking whether main has advanced *past* the release commit.
                    git fetch --force origin main
                    if [ "$(git rev-parse origin/main)" != "$WAIT_SHA" ] \
                       && git merge-base --is-ancestor "$WAIT_SHA" origin/main; then
                      # main advanced past the release commit, so its own CI was
                      # superseded. Its base was a merge_group-gated (green) main tip
                      # and its delta is version-files only, so a superseded run is
                      # not a real failure — proceed to tag the landed release commit.
                      echo "CI for $WAIT_SHA was superseded by a later push to main; release commit is a green ancestor, proceeding: $url"
                      exit 0
                    fi
                    # Cancelled while still at main's tip: not a concurrency
                    # supersession, so treat as transient and keep polling.
                    echo "CI for $WAIT_SHA is completed/$conclusion while still at main's tip (transient); continuing to wait: $url"
                    ;;
                  *)
                    echo "::error::CI completed with $conclusion for $WAIT_SHA: $url"
                    exit 1
                    ;;
                esac
              else
                echo "CI for $WAIT_SHA is $status: $url"
              fi
            else
              echo "Waiting for CI run for $WAIT_SHA..."
            fi

            sleep 30
          done

          echo "::error::Timed out waiting for CI on $WAIT_SHA"
          exit 1

      - name: Push release tag
        if: ${{ steps.release-run.outputs.skip_creation != 'true' }}
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          RELEASE_SHA=$(git rev-parse HEAD)
          git fetch --force origin main
          # The tag points at the release commit, which is a permanent ancestor of
          # main once pushed — it does NOT need to be main's current tip. main
          # legitimately advances during the up-to-1h CI wait. Only fail if the
          # release commit is no longer contained in main (orphaned by a revert or
          # history rewrite), which would leave the tag pointing off-branch.
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "::error::release commit $RELEASE_SHA is not contained in origin/main (reverted or history rewritten)"
            exit 1
          fi
          git push "https://x-access-token:${RELEASE_BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/$TAG"

  dispatch-recovery:
    name: Dispatch Existing Tag Recovery
    needs: [cut-nightly-release]
    if: ${{ needs.cut-nightly-release.outputs.dispatch_recovery == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    steps:
      - name: Dispatch release workflow for existing tag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          TAG: ${{ needs.cut-nightly-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          # Dispatch from main, not from the tag: --ref selects which release.yml is
          # EXECUTED, and the tag's copy is frozen at whatever was broken when it was cut,
          # so a CI fix landed on main could never reach a stuck tag. `-f tag=` still pins
          # the SOURCE that gets built to the tag's SHA (see release.yml resolve-release-ref),
          # so this changes the CI config only, never the released code.
          # --repo is required: this job has no checkout, so gh cannot infer the
          # repository from a local git directory and dies with "not a git repository".
          gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref main -f tag="$TAG"
