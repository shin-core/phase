# Publishing this manifest activates shell self-updates and the legacy nightly bridge;
# re-dispatching with an older tag is the rollback path.
name: Publish Shell Manifest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing shell release tag to publish, e.g. shell-v1.0.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish Shell Updater Manifest
    if: github.repository == 'phase-rs/phase'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ inputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate release and download manifest
        run: |
          set -euo pipefail

          if ! [[ "$TAG" =~ ^shell-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::shell release tag must be like shell-v1.0.0"
            exit 1
          fi

          gh release view "$TAG" >/dev/null
          mkdir manifest
          gh release download "$TAG" --pattern update.json --dir manifest
          jq -e 'has("version") and has("platforms")' manifest/update.json >/dev/null

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upload updater manifest to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object put "phase-rs-data/desktop/update.json" --file manifest/update.json --remote --content-type application/json --cache-control "max-age=60, must-revalidate"
